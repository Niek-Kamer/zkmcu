[meta]
date       = "2026-04-26"
target     = "rp2350-cortex-m33"
toolchain  = "rustc 1.94.1"
profile    = "release, lto=fat, opt-level=s, codegen-units=1"
commit     = ""
experiment = "phase-5: BabyBear + Quartic STARK prover on Cortex-M33 (N=256, ~95-bit security)"

[hardware]
board       = "Raspberry Pi Pico 2 W"
cpu         = "ARM Cortex-M33F (FPv5-SP, DSP, UMAAL)"
clock_hz    = 150_000_000
sram_bytes  = 524288
flash_bytes = 4194304

[libraries]
"winterfell"           = "0.13.1"   # vendored fork with FieldExtension::Quartic
"zkmcu-babybear"       = "0.1.0"    # BabyBear field: p = 15*2^27+1, 31-bit
"zkmcu-verifier-stark" = "0.1.0"
"bench-core"           = "0.1.0"
"rp235x-hal"           = "0.4.0"

[footprint]
heap_bytes       = 393216         # 384 KB static heap (TrackingTlsf)
stack_peak_bytes = 4672           # measured via measure_stack_peak

[vector]
source       = "bench-rp2350-m33-stark-prover-bb, on-device prove + self-verify"
circuit      = "Fibonacci AIR, 2 columns"
proof_system = "STARK / FRI"
field        = "BabyBear (15*2^27+1, 31-bit), Quartic extension"
hash         = "Blake3-256"
num_queries           = 8
blowup_factor         = 4
fri_folding_factor    = 4
fri_max_remainder_deg = 7
security_bits_conjectured = 95    # Quartic ext over 31-bit field

# ---- N = 256, 8 stable iterations ----
[bench.stark_prove_fib_n256]
circuit          = "Fibonacci AIR, N = 256 trace steps"
iterations       = 8
proof_size_bytes = 6872
heap_peak_bytes  = 253804
stack_peak_bytes = 4672
cycles_median    = 22_200_000     # approximate: 148ms * 150MHz; exact per-iter log not retained
us_median        = 148_000
result           = "ok"
notes            = "cycles_median is approximate from ms readout; exact cycle log from this session was not retained in the compacted transcript"

[bench.stark_verify_fib_n256]
circuit       = "Fibonacci AIR, N = 256 trace steps"
iterations    = 8
cycles_median = 4_350_000         # approximate: 29ms * 150MHz
us_median     = 29_000
result        = "ok"

# ---- vs Phase 4 (Goldilocks+None, ~32-bit security) ----
[bench.phase4_vs_phase5]
# Phase 4 Goldilocks+None at N=256 (from 2026-04-26-m33-stark-prover-fib):
phase4_prove_us  = 134_000
phase4_verify_us = 19_400
phase4_security  = 32   # conjectured bits

# Phase 5 BabyBear+Quartic at N=256:
phase5_prove_us  = 148_000
phase5_verify_us = 29_000
phase5_security  = 95   # conjectured bits

# The useful number: +10% prove overhead for ~3x more security bits.
# Verify is +49% because Quartic extension adds composition polynomial cost.
prove_overhead_pct  = 10.4
verify_overhead_pct = 49.5
heap_delta_bytes    = -52484      # BabyBear uses LESS heap: 253804 vs 306288
proof_size_delta    = 204         # BabyBear proof slightly larger: 6872 vs 6668
