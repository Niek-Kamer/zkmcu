[meta]
date = "2026-04-27"
target = "rp2350-cortex-m33"
toolchain = "rustc 1.94.1"
profile = "release, lto=fat, opt-level=s, codegen-units=1"
commit = ""

[hardware]
board = "Raspberry Pi Pico 2 W"
cpu = "ARM Cortex-M33"
clock_hz = 150_000_000
sram_bytes = 524288
flash_bytes = 4194304

[libraries]
"substrate-bn"     = "0.6.0"
"substrate-bn-src" = "local path: vendor/bn (Niek-Kamer/bn master; cortex-m33-asm + .ram_text placement)"
"ark-groth16"      = "0.5.0"

[footprint]
text_bytes = 101_264
data_bytes = 0
bss_bytes  = 98_348
heap_bytes = 98_304
stack_peak_bytes = 15_724

# ---- Poseidon Merkle membership (headline results of this run) ----------

[bench.groth16_verify_poseidon_d3]
circuit       = "Poseidon Merkle membership, depth=3 (8 leaves, 739 constraints)"
public_inputs = 1
ic_size       = 2
iterations    = 9
cycles_median = 85_544_044
cycles_min    = 85_540_709
cycles_max    = 85_549_877
us_median     = 570_293
result        = "ok"

[bench.groth16_verify_poseidon_d10]
circuit       = "Poseidon Merkle membership, depth=10 (1024 leaves, 2461 constraints)"
public_inputs = 1
ic_size       = 2
iterations    = 9
cycles_median = 85_624_602
cycles_min    = 85_619_298
cycles_max    = 85_638_393
us_median     = 570_830
result        = "ok"

# Succinctness delta: depth-10 vs depth-3 = +537 µs (+0.09%).
