[meta]
date       = "2026-05-03"
target     = "rp2350-cortex-m33"
toolchain  = "rustc 1.94.1"
profile    = "release, lto=fat, opt-level=s, codegen-units=1, panic=abort"
commit     = ""    # uncommitted at capture time; first run after the option-C RTC verifier landed
phase      = "Phase H — constant-time dual-hash verifier reject characterisation, RTC variant (option C)"

[hardware]
board       = "Raspberry Pi Pico 2 W"
cpu         = "ARM Cortex-M33 @ 150 MHz"
clock_hz    = 150_000_000
sram_bytes  = 524_288
flash_bytes = 4_194_304

[libraries]
"p3-uni-stark"           = "0.5.1 (vendor/Plonky3, path dep, RTC patch this session)"
"p3-baby-bear"           = "0.5.1 (vendor/Plonky3, path dep, audited Poseidon2 constants)"
"p3-poseidon2-air"       = "0.5.1 (vendor/Plonky3, path dep)"
"p3-blake3"              = "0.5.1 (vendor/Plonky3, path dep)"
"p3-fri"                 = "0.5.1 (vendor/Plonky3, path dep, RTC patch this session)"
"p3-commit"              = "0.5.1 (vendor/Plonky3, path dep, Pcs::verify_run_to_completion added this session)"
"postcard"               = "1.1.3 (no_std, alloc feature)"
"zkmcu-verifier-plonky3" = "0.1.0 (verify_with_config_rtc + dual-CT switch this session)"
"zkmcu-vectors"          = "0.1.0"
"bench-core"             = "0.1.0"
"rp235x-hal"             = "0.4.0"

[footprint]
heap_bytes        = 393_216
heap_base         = 156_360
heap_peak         = 304_180
stack_peak_bytes  = 0          # not captured

[circuit]
name           = "pq-semaphore-d10-dual"
description    = "Dual-hash PQ-Semaphore depth-10 STARK verified twice, once with Poseidon2-BabyBear-16 and once with Blake3, sharing the same public-input blob. Both legs must accept. CT path now dispatches via verify_run_to_completion on both legs."
field          = "BabyBear (15 * 2^27 + 1, 31-bit)"
extension      = "Quartic (BinomialExtensionField<BabyBear, 4>)"
hash_p2_leg    = "Poseidon2-BabyBear-16, audited BABYBEAR_POSEIDON2_RC_16_*"
hash_b3_leg    = "Blake3 (p3-blake3 0.5.1)"

[bench.honest_verify]
description   = "Honest dual-hash verify on the committed canonical proof. Baseline for ratio_to_honest. Iters 2-5 of this run scrolled past before serial capture; honest stats below derived from iters 1, 6-16 (n=12 cycles, n=11 us)."
iterations    = 12
