[meta]
date       = "2026-04-30"
target     = "rp2350-cortex-m33"
toolchain  = "rustc 1.94.1"
profile    = "release, lto=fat, opt-level=s, codegen-units=1, panic=abort"
commit     = "phase-F-128bit (uncommitted at capture time)"
phase      = "Phase F — tighten dual-hash to 128 conjectured bits/leg (security-128bit plan)"

[hardware]
board       = "Raspberry Pi Pico 2 W"
cpu         = "Cortex-M33 @ 150 MHz"
clock_hz    = 150_000_000
sram_bytes  = 524_288
flash_bytes = 4_194_304

[libraries]
"p3-uni-stark"           = "0.5.1 (vendor/Plonky3, path dep)"
"p3-baby-bear"           = "0.5.1 (vendor/Plonky3, path dep, audited Poseidon2 constants)"
"p3-blake3"              = "0.5.1 (vendor/Plonky3, path dep)"
"blake3"                 = "1.8 (no_std)"
"p3-poseidon2-air"       = "0.5.1 (vendor/Plonky3, path dep)"
"p3-fri"                 = "0.5.1 (vendor/Plonky3, path dep)"
"postcard"               = "1.1.3 (no_std, alloc feature)"
"zkmcu-verifier-plonky3" = "0.1.0 (Phase F: QUERY_POW_BITS 16→17 in pq_semaphore + pq_semaphore_blake3)"
"zkmcu-vectors"          = "0.1.0 (regenerated proofs at data/pq-semaphore-d10-dual/)"
"bench-core"             = "0.1.0"
"rp235x-hal"             = "0.4.0"

[footprint]
heap_bytes        = 393_216
heap_peak         = 304_180       # identical to Phase E.1 — extra grinding bit costs no heap
stack_peak_bytes  = 11_196        # 64 KB sentinel paint succeeded

[circuit]
name           = "pq-semaphore-d10-dual"
description    = "PQ-Semaphore depth-10 STARK over BabyBear × Quartic, audited Poseidon2-BabyBear-16 + Blake3, FRI grinding 16+17, AIR digest=6, dual-leg verify (drop-between). Phase F: query-PoW bumped 16→17 to lift conjectured FRI security from 127 to 128."
field          = "BabyBear (15 * 2^27 + 1, 31-bit)"
extension      = "Quartic (BinomialExtensionField<BabyBear, 4>)"
hash_p2        = "Poseidon2-BabyBear-16, audited BABYBEAR_POSEIDON2_RC_16_*"
hash_b3        = "Blake3 (32-byte digest), p3-blake3 wrapper of blake3 1.8"
digest_words   = 6
trace_rows     = 16
merkle_depth   = 10
blowup_factor  = 2
num_queries    = 64
fri_folding    = 4
commit_pow_bits = 16
query_pow_bits  = 17                 # was 16 (Phase E.1) — Phase F bump for the 128th bit
proof_p2_bytes = 172_977             # unchanged vs Phase E.1: PoW nonce is fixed-width
proof_b3_bytes = 163_824             # unchanged vs Phase E.1
public_inputs  = 24
public_bytes   = 96
security_bits_conjectured_fri      = 128   # per leg: queries × log_blowup + commit_pow + query_pow — model
security_bits_hash_collision       = 186   # per leg, AIR digest side (6 × 31-bit BabyBear)
security_bits_combined_lower_bound = 128   # min across legs
security_note                      = "128-bit conjectured classical security per leg. Soundness compounds across hashes: a forged proof must verify under BOTH the algebraic Poseidon2-BabyBear FRI and the generic Blake3 FRI. A cryptanalytic break of one hash does not collapse the verifier. Post-quantum by construction (no algebraic hardness assumption, ROM/QROM-only); standard PQ-tight bound is roughly half the classical bit count due to Grover on symmetric primitives."

# ---- Headline result. Phase F dual-hash, depth-10 PQ-Semaphore on Cortex-M33, 128 conjectured bits/leg. ----

[bench.pq_semaphore_dual_verify]
circuit       = "pq-semaphore-d10-dual, full-pipeline (parse_and_verify both legs, drop between)"
iterations    = 20
sample_window = "iters 1..=20 from raw.log"
cycles_min    = 241_636_184
cycles_max    = 241_777_586
cycles_median = 241_715_923          # mean of 10th and 11th sorted samples
us_min        = 1_610_907
us_max        = 1_611_850
us_median     = 1_611_439
range_pct     = 0.058
result        = "ok"

# ---- Phase F predictions (proposed in conversation 2026-04-30 before flash). ----

[predictions_phase_f]
predicted_us_low     = 1_611_000     # ≤ +1% over Phase E.1 (1611387 µs)
predicted_us_high    = 1_627_500     # +1% upper bound
phase_e1_baseline_us = 1_611_387     # benchmarks/runs/2026-04-30-m33-pq-semaphore-dual
verdict              = "INSIDE BAND, AT FLOOR: measured 1611.439 ms M33 — predicted ≤ 1627.5 ms. Δ vs Phase E.1: +52 µs (+0.0032 %). Verifier-side cost of one extra query-PoW bit is below measurement noise — the verifier checks one extra trailing-zero hash bit per query stage, which is amortised against per-query Merkle-path work."

predicted_proof_size_total_b = 336_801   # 0 byte change — PoW nonce is fixed-width
measured_proof_size_total_b  = 336_801   # 172_977 + 163_824
verdict_proof_size           = "EXACT: 336_801 B total, identical to Phase E.1. Confirms the q-PoW nonce field is fixed-width in Plonky3's serialised proof — bumping the difficulty does not add wire bytes, only prover grind work."

predicted_heap_peak  = 304_180
measured_heap_peak   = 304_180
verdict_heap         = "EXACT: 304 KB peak, identical to Phase E.1. Drop-between pattern keeps peak at max(p2_peak, b3_peak); FRI PoW state is ephemeral, not heap-resident."

predicted_combined_security = 128
measured_combined_security  = 128
verdict_security            = "ON TARGET: 128 conjectured bits per leg, dual-hash composition unchanged. The 1-bit gap that Phase E.1 ran (127 conj) is closed by adding one query-PoW bit (16 → 17) at zero verifier cost."

[result_summary]
status                  = "Phase F landed, hypothesis ON TARGET — 128 conjectured bits/leg, all other metrics identical to Phase E.1 within noise"
m33_dual_q17_ms_median  = 1_611.439
m33_vs_phase_e1_pct     = 0.003       # (1611.439 - 1611.387) / 1611.387 * 100
takeaway                = "The 128-bit-class headline now sits at 128 conjectured bits per leg with the same 1.6 s M33 verify, 384 KB heap, 337 KB proof bytes, and dual-hash defence-in-depth as Phase E.1. The Phase A model — '+1 grinding bit ≈ +1 conjectured bit at near-zero verifier cost' — held cleanly across both hash legs."
