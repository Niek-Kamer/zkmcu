[meta]
date = "2026-04-27"
target = "rp2350-hazard3-rv32"
toolchain = "rustc 1.94.1"
profile = "release, lto=fat, opt-level=s, codegen-units=1"
commit = ""

[hardware]
board = "Raspberry Pi Pico 2 W"
cpu = "Hazard3 RISC-V RV32IMAC"
clock_hz = 150_000_000
sram_bytes = 524288
flash_bytes = 4194304

[libraries]
"substrate-bn"     = "0.6.0"
"substrate-bn-src" = "local path: vendor/bn (Niek-Kamer/bn master; no asm, pure Rust)"
"ark-groth16"      = "0.5.0"

[footprint]
text_bytes = 78_620
data_bytes = 0
bss_bytes  = 524_288
heap_bytes = 262_144
stack_peak_bytes = 15_692

# ---- Poseidon Merkle membership (headline results of this run) ----------

[bench.groth16_verify_poseidon_d3]
circuit       = "Poseidon Merkle membership, depth=3 (8 leaves, 739 constraints)"
public_inputs = 1
ic_size       = 2
iterations    = 5
cycles_median = 186_193_983
cycles_min    = 186_125_960
cycles_max    = 186_223_928
us_median     = 1_241_293
result        = "ok"

[bench.groth16_verify_poseidon_d10]
circuit       = "Poseidon Merkle membership, depth=10 (1024 leaves, 2461 constraints)"
public_inputs = 1
ic_size       = 2
iterations    = 4
cycles_median = 186_325_556
cycles_min    = 186_305_885
cycles_max    = 186_350_084
us_median     = 1_242_170
result        = "ok"

# Succinctness delta: depth-10 vs depth-3 = +877 µs (+0.07%).
# Cross-ISA succinctness ratio: M33 delta=537 µs, RV32 delta=877 µs — both noise-level.

