[meta]
date       = "2026-04-29"
target     = "rp2350-hazard3 (RISC-V rv32imac)"
toolchain  = "rustc 1.94.1"
profile    = "release, lto=fat, opt-level=s, codegen-units=1, panic=abort"
commit     = "post-phase-A + phase-B-digest6 (uncommitted at capture time)"
phase      = "Phase B — Merkle digest 4 → 6 (security-128bit plan)"

[hardware]
board       = "Raspberry Pi Pico 2 W"
cpu         = "Hazard3 RV32IMAC @ 150 MHz"
clock_hz    = 150_000_000
sram_bytes  = 524_288
flash_bytes = 4_194_304

[libraries]
"p3-uni-stark"           = "0.5.1 (vendor/Plonky3, path dep)"
"p3-baby-bear"           = "0.5.1 (vendor/Plonky3, path dep, audited Poseidon2 constants)"
"p3-poseidon2-air"       = "0.5.1 (vendor/Plonky3, path dep)"
"p3-fri"                 = "0.5.1 (vendor/Plonky3, path dep)"
"postcard"               = "1.1.3 (no_std, alloc feature)"
"zkmcu-verifier-plonky3" = "0.1.0"
"zkmcu-vectors"          = "(committed proof at data/pq-semaphore-d10/, regenerated for digest_words=6)"
"bench-core"             = "0.1.0"
"rp235x-hal"             = "0.4.0"

[footprint]
heap_bytes        = 393_216       # configured static heap (384 KB)
heap_after_parse  = 156_360       # heap residency after parse_proof + parse_public_inputs
heap_peak_bytes   = 0             # not captured this run (serial cut before [boot] line)
stack_peak_bytes  = 0             # not captured this run

[circuit]
name           = "pq-semaphore-d10"
description    = "PQ-Semaphore depth-10 Merkle membership + nullifier + scope binding, custom AIR over BabyBear with audited Poseidon2-16, FRI grinding 16+16 bits, 6-element BabyBear digest"
field          = "BabyBear (15 * 2^27 + 1, 31-bit)"
extension      = "Quartic (BinomialExtensionField<BabyBear, 4>)"
hash           = "Poseidon2-BabyBear-16, audited BABYBEAR_POSEIDON2_RC_16_*"
digest_words   = 6                 # was 4; ~186-bit digest space, ~93-bit generic-collision resistance
trace_rows     = 16
trace_cols     = 332               # ~332 via size_of::<PqSemaphoreCols<u8>>()
merkle_depth   = 10
blowup_factor  = 2                 # log_blowup = 1
num_queries    = 64
fri_folding    = 4                 # max_log_arity = 1, default folding
commit_pow_bits = 16               # carried from Phase A
query_pow_bits  = 16               # carried from Phase A
proof_bytes    = 172_607           # was 168_803 at digest=4 + grind32; +3804 B (+2.3%)
public_inputs  = 24                # was 16; 4 × DIGEST_WIDTH
public_bytes   = 96                # was 64; NUM_PUBLIC_INPUTS × 4
security_bits_conjectured = 127    # FRI side unchanged; hash-collision floor moves 124 → 186

# ---- Headline result. Phase-B digest 4→6, depth-10 PQ-Semaphore on Hazard3. ----

[bench.pq_semaphore_verify]
circuit       = "pq-semaphore-d10, 64 queries, 16+16 grinding bits, digest=6, 16-row trace"
iterations    = 15                  # serial truncated at iter 1-5 (boot-line collision); iter 6-20 captured cleanly
cycles_min    = 190_411_247
cycles_max    = 190_497_076
cycles_median = 190_459_108
cycles_mean   = 190_454_559
us_min        = 1_269_408
us_max        = 1_269_980
us_median     = 1_269_727
us_mean       = 1_269_697
range_pct     = 0.045              # (max - min) / median, percent
result        = "ok"

# ---- Phase-B predictions (from research/notebook/2026-04-29-security-128bit-plan.md § Phase B). ----

[predictions_phase_b]
predicted_us_low      = 1_410_000
predicted_us_high     = 1_530_000
measured_us_median    = 1_269_727
verdict_verify_time   = "BELOW PREDICTED BAND (good): +13.75 ms (+1.09%) over Phase-A RV32 baseline (1255.981 ms). Plan budgeted +12-22% (proportional to M33). Same root cause as M33: the digest-width change widens the trace by ~11 columns (~3.4%), it does not multiply Poseidon2 work. The verifier evaluates the full width-16 permutation on every active row regardless of digest width."

predicted_proof_bytes_low  = 215_000
predicted_proof_bytes_high = 235_000
measured_proof_bytes       = 172_607
verdict_proof_size         = "BELOW PREDICTED BAND (good): +3804 B (+2.3%). Proof contents are ISA-independent — same proof.bin verifies on M33 and RV32 — so the size delta matches the M33 run."

predicted_security_bits_unchanged = 127
measured_security_bits            = 127
verdict_security                  = "AS PREDICTED: FRI-side 127 conjectured bits unchanged. Hash-collision floor moved 124 → 186 bits, no longer the bottleneck."

predicted_variance_max_pct = 0.15
measured_variance_pct      = 0.045
verdict_variance           = "INSIDE BAND (well under): 0.045% range/median across 15 iterations."

# ---- Comparison vs Phase A RV32 (digest=4 + grind32). ----

[compare.vs_phase_a]
baseline_run            = "benchmarks/runs/2026-04-29-rv32-pq-semaphore-grind32"
baseline_us_median      = 1_255_981
baseline_proof_bytes    = 168_803
baseline_security_bits  = 127
baseline_digest_words   = 4
d6_us_median            = 1_269_727
d6_proof_bytes          = 172_607
d6_security_bits        = 127      # FRI side; hash floor moved 124 → 186
d6_digest_words         = 6
verify_delta_pct        = "+1.09% (+13.75 ms)"
proof_size_delta_bytes  = +3_804
hash_floor_delta_bits   = +62      # 124 → 186
note                    = "Phase B lifts the hash-collision floor 124 → 186 bits, removing it as the soundness bottleneck. Cross-ISA verifier cost scales identically to M33 in relative terms (M33 +1.40%, RV32 +1.09%)."

# ---- Cross-ISA portability ----

[compare.cross_isa]
m33_us_median           = 1_065_839       # benchmarks/runs/2026-04-29-m33-pq-semaphore-d6
rv32_us_median          = 1_269_727
ratio_rv32_over_m33     = 1.191           # was 1.195 on Phase A; effectively unchanged
note                    = "Phase B preserves the M33 / RV32 portability ratio. The trace-width delta affects both ISAs proportionally because the LDE / FRI commit work is field-arithmetic-bound, and the field arithmetic ratio between the ISAs (UMAAL on M33 vs MUL on RV32) is what sets the cross-ISA gap, not digest width."
