[meta]
date       = "2026-04-30"
target     = "rp2350-cortex-m33"
toolchain  = "rustc 1.94.1"
profile    = "release, lto=fat, opt-level=s, codegen-units=1, panic=abort"
commit     = "phase-H (uncommitted at capture time)"
phase      = "Phase H — constant-time dual verify, honest path (hardening plan, 2026-04-30)"

[hardware]
board       = "Raspberry Pi Pico 2 W"
cpu         = "Cortex-M33 @ 150 MHz"
clock_hz    = 150_000_000
sram_bytes  = 524_288
flash_bytes = 4_194_304

[libraries]
"p3-uni-stark"           = "0.5.1 (vendor/Plonky3, path dep)"
"p3-baby-bear"           = "0.5.1 (vendor/Plonky3, path dep, audited Poseidon2 constants)"
"p3-blake3"              = "0.5.1 (vendor/Plonky3, path dep)"
"blake3"                 = "1.8 (no_std)"
"p3-poseidon2-air"       = "0.5.1 (vendor/Plonky3, path dep)"
"p3-fri"                 = "0.5.1 (vendor/Plonky3, path dep)"
"postcard"               = "1.1.3 (no_std, alloc feature)"
"zkmcu-verifier-plonky3" = "0.1.0 (Phase H: pq_semaphore_dual_ct module + verify_constant_time entry point)"
"zkmcu-vectors"          = "0.1.0 (pq-semaphore-d10-dual)"
"bench-core"             = "0.1.0"
"rp235x-hal"             = "0.4.0"

[footprint]
heap_bytes        = 393_216

# Honest-path dual CT verify on the static `pq-semaphore-d10-dual` triple.
# 26 iterations captured in raw.log; the first ([1]) bleeds across the
# boot line as the bench harness prints `[boot]` and the iter-1 marker
# in adjacent lines, so iter-1 is included. Heap peak matches the
# Phase F dual measurement (304_180 B, drop-between pattern preserved).
[bench.pq_semaphore_dual_ct_verify_honest]
circuit              = "PQ-Semaphore (Poseidon2-BabyBear ∧ Blake3, depth-10 Merkle, 4-element public)"
public_inputs        = 16   # 4 digests × DIGEST_WIDTH=6 = 24, packed into 16 BabyBear cells per parse_public_inputs
iterations           = 26
cycles_median        = 243_096_065
cycles_min           = 243_003_281
cycles_max           = 243_164_232
us_median            = 1_620_640
ms_median            = 1620
heap_peak_bytes      = 304_180
stack_peak_bytes     = 11_460
result               = "ok"

# Phase H success criterion: honest CT verify within +1 % of Phase F honest
# (1611.44 ms, benchmarks/runs/2026-04-30-m33-pq-semaphore-dual-q17/).
# Measured 1620.640 ms = +0.57 % above Phase F honest. Well inside budget.
# range_pct = (max-min)/median = (243_164_232 - 243_003_281) / 243_096_065
#           = 0.0662 % — also inside the < 0.1 % per-pattern target.
