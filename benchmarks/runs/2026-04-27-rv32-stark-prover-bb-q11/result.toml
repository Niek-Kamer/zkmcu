[meta]
date       = "2026-04-27"
target     = "rp2350-hazard3-rv32"
toolchain  = "rustc 1.94.1"
profile    = "release, lto=fat, opt-level=s, codegen-units=1"
commit     = ""

[hardware]
board      = "Raspberry Pi Pico 2 W"
cpu        = "Hazard3 RISC-V RV32IMAC @ 150 MHz"
clock_hz   = 150_000_000
sram_bytes = 524_288
flash_bytes = 4_194_304

[libraries]
"winterfell" = "0.11 (vendored)"

[circuit]
field          = "BabyBear (31-bit)"
extension      = "Quartic"
trace_len      = 256
blowup_factor  = 4
num_queries    = 11
lde_domain     = 1024
grinding       = 0
proof_bytes    = 8_970
security_bits_conjectured = 21

# Layout-probe confirmation: a second build with 16 bytes of padding shifted into .rodata
# produced identical results (215,000 µs median, 0.17% variance over 45 iters vs 45 iters).
# The 1.45× cross-ISA ratio vs M33 (148 ms) is real — not an XIP cache alignment artifact.
# See notes.md for the cross-ISA anomaly analysis vs Phase 3.3 (q=8) 1.04× ratio.

# ---- prove + verify (45 loop iterations, confirmed with layout-probe build) ----
# Boot: stack=4628, heap_peak=253804, heap_after=10 (fully freed).

[bench.stark_prove]
circuit     = "Fibonacci trace, N=256, BabyBear+Quartic, blowup=4, 11 queries"
iterations  = 45
cycles_median = 32_250_061
cycles_min    = 32_223_703
cycles_max    = 32_279_989
us_median     = 215_000
us_min        = 214_824
us_max        = 215_199
result        = "ok"

[bench.stark_verify]
circuit     = "Fibonacci, N=256, BabyBear+Quartic, blowup=4, 11 queries"
iterations  = 45
cycles_median = 6_323_113
cycles_min    = 6_297_710
cycles_max    = 6_367_724
us_median     = 42_221
result        = "ok"

[bench.prove_verify_total]
iterations  = 45
us_median   = 257_221
us_min      = 256_878
us_max      = 257_490
ms_median   = 257
heap_after  = 10

[bench.boot_prove]
stack_bytes   = 4_628
heap_peak     = 253_804
cycles        = 32_258_484
us            = 215_056
proof_bytes   = 8_970
security_bits = 21
result        = "ok"
