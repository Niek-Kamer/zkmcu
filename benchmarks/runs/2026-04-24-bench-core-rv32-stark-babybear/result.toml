[meta]
date = "2026-04-24"
target = "rp2350-hazard3-rv32"
toolchain = "rustc 1.94.1"
profile = "release, lto=fat, opt-level=s, codegen-units=1"
commit = ""
experiment = "bench-core refactor rebaseline: STARK / BabyBear x Quartic, TLSF, Hazard3 + TrackingTlsf (new on RV32)"

[hardware]
board = "Raspberry Pi Pico 2 W"
cpu = "Hazard3 RV32IMAC"
clock_hz = 150_000_000
sram_bytes = 524288
flash_bytes = 4194304

[libraries]
"winterfell"           = "0.13.1"    # vendored fork with Quartic extension
"zkmcu-babybear"       = "0.1.0"
"zkmcu-verifier-stark" = "0.1.0"
"bench-core"           = "0.1.0"
"embedded-alloc"       = "0.7.0"     # tlsf feature
"riscv"                = "0.11"
"riscv-rt"             = "0.12"
"rp235x-hal"           = "0.4.0"

[footprint]
text_bytes = 0
data_bytes = 0
bss_bytes  = 0
heap_bytes = 262144
heap_base_bytes = 61404
heap_peak_bytes = 91362              # first RV32 BabyBear heap measurement, matches M33 sibling
stack_peak_bytes = 5400

[vector]
source = "winter-prover via zkmcu-host-gen::stark-babybear"
circuit = "Fibonacci AIR, N = 1024 trace steps"
proof_system = "STARK / FRI"
field = "BabyBear (2^31 - 2^27 + 1), F_{p^4}"
hash = "Blake3-256"
security_bits_conjectured = 95
extension_degree = 4
extension_mul_algo = "Karatsuba 9-mult + sparse mul_by_W = 11"  # default in zkmcu-babybear since phase 3.3 commit b794d20

[bench.stark_verify_fib_1024_babybear_q_tlsf]
iterations = 22
cycles_median = 19_203_467           # avg of 11th + 12th sorted
cycles_min    = 19_182_642
cycles_max    = 19_227_311
us_median     = 128_023
us_min        = 127_884
us_max        = 128_182
result = "ok"
# Variance: (max - min) / median = 0.23 %

[bench.vs_prior_baseline]
# 2026-04-24-rv32-stark-fib-1024-babybear-q-kara was the matching
# reference (same day, same Karatsuba code path, pre-refactor firmware).
# Note: the non-kara pre-refactor RV32 sibling was at 136.64 ms because
# it used schoolbook 16-mult — but the current zkmcu-babybear field.rs
# has had Karatsuba as the default since commit b794d20, so the
# apples-to-apples comparison is against -q-kara.
prior_us_median = 129_054
delta_us = -1_031                    # -0.80 %, essentially unchanged
prior_cycles_median = 19_358_117
delta_cycles = -154_650
# RV32's 31 GPRs gave the ExtensibleField<4>::mul hot loop plenty of
# register slack to begin with, so the bench-core closure-wrap that
# unlocked a 23 % win on M33 couldn't help here — the M33 Thumb-2 had
# ~13 usable GPRs and was right at the spill boundary.
heap_peak_before = 0                 # not measured pre-refactor
heap_peak_after  = 91_362            # new this run, matches M33 byte-for-byte

[bench.vs_goldilocks_this_run]
this_us_median = 128_023
goldilocks_us_median = 107_960       # from ../2026-04-24-bench-core-rv32-stark-goldilocks/
ratio = 1.186                        # BabyBear Karatsuba +18.6 % over Goldilocks on
                                     # RV32, vs pre-refactor Karatsuba ratio of
                                     # 129.05 / 112.40 = 1.148x (+14.8 %). Slightly
                                     # wider because Goldilocks also got -3.95 % from
                                     # the refactor while BabyBear-Kara here was
                                     # essentially flat (-0.80 %).

[bench.cross_isa]
# RV32/M33 ratio on matched Karatsuba BabyBear:
# Pre-refactor:  129.05 / 124.22 = 1.039x  ← phase 3.3 headline figure
# Post-refactor: 128.02 /  95.63 = 1.339x  ← THIS RUN
# The "BabyBear-Karatsuba narrows the cross-ISA gap to 1.04x" claim
# no longer holds under bench-core. M33 picked up a register-allocation
# win the refactor unlocked; RV32 didn't. The phase 3.3 report needs
# this update before anyone cites the 1.04x figure.
ratio_rv32_over_m33 = 1.339
pre_refactor_ratio_rv32_over_m33 = 1.039
