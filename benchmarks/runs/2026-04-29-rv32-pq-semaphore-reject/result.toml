[meta]
date       = "2026-04-29"
target     = "rp2350-hazard3 (RISC-V rv32imac)"
toolchain  = "rustc 1.94.1"
profile    = "release, lto=fat, opt-level=s, codegen-units=1, panic=abort"
commit     = "post-phase-B + phase-C-reject (uncommitted at capture time)"
phase      = "Phase C — two-stage early exit (security-128bit plan), measurement-only"

[hardware]
board       = "Raspberry Pi Pico 2 W"
cpu         = "Hazard3 RV32IMAC @ 150 MHz"
clock_hz    = 150_000_000
sram_bytes  = 524_288
flash_bytes = 4_194_304

[libraries]
"p3-uni-stark"           = "0.5.1 (vendor/Plonky3, path dep)"
"p3-baby-bear"           = "0.5.1 (vendor/Plonky3, path dep, audited Poseidon2 constants)"
"p3-poseidon2-air"       = "0.5.1 (vendor/Plonky3, path dep)"
"p3-fri"                 = "0.5.1 (vendor/Plonky3, path dep)"
"postcard"               = "1.1.3 (no_std, alloc feature)"
"zkmcu-verifier-plonky3" = "0.1.0"
"zkmcu-vectors"          = "0.1.0 (mutations module + committed proof at data/pq-semaphore-d10/)"
"bench-core"             = "0.1.0"
"rp235x-hal"             = "0.4.0"

[footprint]
heap_bytes        = 393_216    # configured static heap (384 KB)
heap_peak_honest  = 329_079    # peak during honest parse_and_verify
heap_peak_reject_max = 329_127 # peak during M3
stack_peak_bytes  = 0          # not captured (boot_measure path skipped in reject harness)

[circuit]
name           = "pq-semaphore-d10"
description    = "PQ-Semaphore depth-10 STARK over BabyBear×Quartic, audited Poseidon2-16, FRI grinding 16+16, digest=6"
field          = "BabyBear (15 * 2^27 + 1, 31-bit)"
extension      = "Quartic (BinomialExtensionField<BabyBear, 4>)"
hash           = "Poseidon2-BabyBear-16, audited BABYBEAR_POSEIDON2_RC_16_*"
digest_words   = 6
trace_rows     = 16
trace_cols     = 332
merkle_depth   = 10
blowup_factor  = 2
num_queries    = 64
fri_folding    = 4
commit_pow_bits = 16
query_pow_bits  = 16
proof_bytes    = 172_607
public_bytes   = 96
security_bits_conjectured = 127

[bench_shape]
description = """
Identical loop to the M33 reject sibling. Same proof bytes, same mutations,
same iteration count. Only the firmware target (riscv32imac-unknown-none-elf)
and runtime allocations execute on the Hazard3 core.
"""
mutations    = ["honest_verify", "M0_header_byte (proof[0] ^= 0xff)", "M1_trace_commit_digest (proof[64] ^= 0xff)", "M2_mid_fri (proof[1024] ^= 0xff)", "M3_query_opening (proof[len-64] ^= 0xff)", "M4_final_layer (proof[len-1] ^= 0xff)", "M5_public_byte (public[0] ^= 0x01)"]
iterations_per_pattern = 16

# ---- Honest baseline measured under the same shape as the reject patterns. ----

[bench.honest_verify]
circuit       = "pq-semaphore-d10, parse_and_verify (parse + make_config + build_air + verify)"
iterations    = 14                  # iters 1+2 lost to a serial line collision; iters 3-16 captured cleanly
cycles_min    = 195_361_387
cycles_max    = 195_450_119
cycles_median = 195_395_469
us_min        = 1_302_409
us_max        = 1_303_000
us_median     = 1_302_636
range_pct     = 0.045
result        = "ok"

# ---- M0: proof[0] ^= 0xff. Postcard varint-header parse fails. ----

[bench.reject_M0_header_byte]
description   = "Flip first proof byte. parse_proof rejects on the corrupted postcard varint header before any verifier work."
iterations    = 16
cycles_min    = 1_333_661
cycles_max    = 1_336_613
cycles_median = 1_334_817
us_min        = 8_891
us_max        = 8_910
us_median     = 8_898
range_pct     = 0.213
result        = "rejected"

# ---- M1: proof[64] ^= 0xff. Lands inside the trace commitment digest. ----

[bench.reject_M1_trace_commit_digest]
description   = "Flip a byte in the trace commitment region. Postcard parses up to that point, then fails on the corrupted varint or content."
iterations    = 16
cycles_min    = 1_342_617
cycles_max    = 1_346_919
cycles_median = 1_344_685
us_min        = 8_950
us_max        = 8_979
us_median     = 8_964
range_pct     = 0.323
result        = "rejected"

# ---- M2: proof[1024] ^= 0xff. Deep in commit-phase / opening header area. ----

[bench.reject_M2_mid_fri]
description   = "Flip a byte 1 KiB in. Postcard advances through commitments and into opening structure before tripping a length varint that fails."
iterations    = 16
cycles_min    = 2_089_850
cycles_max    = 2_093_054
cycles_median = 2_091_745
us_min        = 13_932
us_max        = 13_953
us_median     = 13_944
range_pct     = 0.151
result        = "rejected"

# ---- M3: proof[len-64] ^= 0xff. Last query's last commit-phase opening (Merkle path bytes). ----

[bench.reject_M3_query_opening]
description   = "Flip a byte 64 from the end. Postcard parses successfully — the tail of the proof is hash-bytes Merkle path data with no varints near it. Reject fires inside FRI verify_query when the recomputed root mismatches the commit-phase Merkle commitment for the last query's last fold step."
iterations    = 16
cycles_min    = 8_398_528
cycles_max    = 8_414_684
cycles_median = 8_404_261
us_min        = 55_990
us_max        = 56_097
us_median     = 56_028
range_pct     = 0.191
result        = "rejected"

# ---- M4: proof[len-1] ^= 0xff. Final byte. ----

[bench.reject_M4_final_layer]
description   = "Flip the very last byte of the proof. Lands in commit_pow_witnesses or the last query's tail. Postcard parses; reject fires inside FRI verify when the corresponding PoW witness or Merkle leaf fails to validate."
iterations    = 16
cycles_min    = 8_390_080
cycles_max    = 8_414_442
cycles_median = 8_404_299
us_min        = 55_933
us_max        = 56_096
us_median     = 56_028
range_pct     = 0.291
result        = "rejected"

# ---- M5: public[0] ^= 0x01. Stays canonical (BabyBear < p), desyncs the transcript. ----

[bench.reject_M5_public_byte]
description   = "Flip the low bit of public[0]. The BabyBear element stays canonical so parse_public_inputs accepts. The challenger observes the wrong public-values bytes, which desyncs every Fiat-Shamir sample. PCS verify then fails inside its per-round commit-phase work because every challenger sample diverges from the prover's. Most expensive reject — 151 ms — because PCS verify does its own transcript-binding setup before the failing check."
iterations    = 16
cycles_min    = 22_689_941
cycles_max    = 22_722_204
cycles_median = 22_703_184
us_min        = 151_266
us_max        = 151_481
us_median     = 151_354
range_pct     = 0.142
result        = "rejected"

# ---- Cross-ISA comparison vs M33 sibling run. ----

[compare.cross_isa]
m33_run                  = "benchmarks/runs/2026-04-29-m33-pq-semaphore-reject"
m33_honest_us            = 1_130_581
rv32_honest_us           = 1_302_636
ratio_honest             = 1.152

m33_M0_us                = 8_529
rv32_M0_us               = 8_898
ratio_M0                 = 1.043

m33_M1_us                = 8_579
rv32_M1_us               = 8_964
ratio_M1                 = 1.045

m33_M2_us                = 13_138
rv32_M2_us               = 13_944
ratio_M2                 = 1.061

m33_M3_us                = 44_107
rv32_M3_us               = 56_028
ratio_M3                 = 1.270

m33_M4_us                = 44_090
rv32_M4_us               = 56_028
ratio_M4                 = 1.271

m33_M5_us                = 126_872
rv32_M5_us               = 151_354
ratio_M5                 = 1.193

note = """
Cross-ISA ratio ranges from 1.04× (parse-fail mutations, memory-bandwidth-
bound — close to ISA parity) to 1.27× (verifier-stage mutations, dominated
by Poseidon2-BabyBear-16 field arithmetic where the M33 UMAAL win shows
through). Honest verify ratio 1.152× sits between because the full pipeline
mixes parse + verify.

Phase B verify-only baseline ratio was 1.191× (m33 1065.84 ms / rv32
1269.73 ms, no parse or alloc inside the timed window). Reject harness
honest 1.152× is slightly tighter because the per-iteration heap memcpy
and postcard parse — both memory-bandwidth-bound — close the cross-ISA gap.
"""

# ---- Predictions vs measurements (Phase C, RV32). ----

[predictions_phase_c]
predicted_header_byte_us_max          = 1_500          # plan: < 1 ms M33; scaled +1.19× for RV32
predicted_fri_fold_us_low             = 5_000
predicted_fri_fold_us_high            = 25_000
predicted_final_layer_us_low          = 700_000
predicted_final_layer_us_high         = 1_080_000
predicted_honest_regression_max_pct   = 0.5
honest_phase_b_us_median              = 1_269_727      # benchmarks/runs/2026-04-29-rv32-pq-semaphore-d6
honest_full_pipeline_us_median        = 1_302_636
verdict_header_byte = "ABOVE PREDICTED FLOOR (good): 8.90 ms vs predicted < 1.5 ms. Same explanation as M33: 172 KB heap-Vec memcpy plus postcard cursor walk. Memory-bandwidth-bound, scales sub-linearly across ISAs."
verdict_fri_fold = "INSIDE BAND: 13.94 ms (M2 mid_fri) lands in the predicted 5–25 ms RV32 window."
verdict_final_layer = "FAR BELOW PREDICTED BAND: 56.03 ms (M3 / M4) vs predicted 700 ms–1 080 ms. Same root cause as M33 — upstream FRI verifier short-circuits on first per-round commit-phase PoW or Merkle-root mismatch, well before per-query work begins."
verdict_public_byte = "NEW DATA POINT (not predicted): 151.35 ms. Public-input transcript desync forces PCS verify through its full per-round preamble before the first PoW check fails."
verdict_honest_regression = "NO REGRESSION: 1302.64 ms full-pipeline vs 1269.73 ms d6 verify-only baseline. The +2.59% delta is the make_config + build_air + parse_proof work the d6 baseline pays once at boot. RV32's smaller delta vs M33 (+6.07%) reflects that parse + alloc are memory-bandwidth-bound and the cross-ISA field-arithmetic gap doesn't apply there."

# ---- Speedup ratios: honest_verify / reject_pattern. ----

[speedup_vs_honest]
honest_us_median = 1_302_636
M0_speedup_x = 146.4
M1_speedup_x = 145.3
M2_speedup_x = 93.4
M3_speedup_x = 23.25
M4_speedup_x = 23.25
M5_speedup_x = 8.61
worst_case_attacker = "M5: 151.35 ms — the maximum a hostile proof can force the device to spend before rejecting on Hazard3. ~8.6× faster than honest verify, capping attacker DoS efficiency at this ratio."
