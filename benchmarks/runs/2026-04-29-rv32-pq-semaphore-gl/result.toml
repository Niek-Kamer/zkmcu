[meta]
date       = "2026-04-29"
target     = "rp2350-hazard3 (RISC-V rv32imac)"
toolchain  = "rustc 1.94.1"
profile    = "release, lto=fat, opt-level=s, codegen-units=1, panic=abort"
commit     = "phase-D-goldilocks (uncommitted at capture time)"
phase      = "Phase D — Goldilocks × Quadratic alternate config (security-128bit plan)"

[hardware]
board       = "Raspberry Pi Pico 2 W"
cpu         = "Hazard3 RV32IMAC @ 150 MHz"
clock_hz    = 150_000_000
sram_bytes  = 524_288
flash_bytes = 4_194_304

[libraries]
"p3-uni-stark"           = "0.5.1 (vendor/Plonky3, path dep)"
"p3-goldilocks"          = "0.5.1 (vendor/Plonky3, path dep, audited Poseidon2 RCs)"
"p3-poseidon2-air"       = "0.5.1 (vendor/Plonky3, path dep)"
"p3-fri"                 = "0.5.1 (vendor/Plonky3, path dep)"
"postcard"               = "1.1.3 (no_std, alloc feature)"
"zkmcu-verifier-plonky3" = "0.1.0 (added pq_semaphore_goldilocks module)"
"zkmcu-vectors"          = "0.1.0 (committed proof at data/pq-semaphore-d10-gl/)"
"bench-core"             = "0.1.0"
"rp235x-hal"             = "0.4.0"

[footprint]
heap_bytes        = 491_520
heap_peak         = 415_312
heap_after_parse  = 245_992
stack_peak_bytes  = 0          # not captured (same caveat as M33 sibling)

[circuit]
name           = "pq-semaphore-d10-gl"
description    = "PQ-Semaphore depth-10 STARK over Goldilocks × Quadratic, audited Poseidon2-Goldilocks-16, FRI grinding 16+16, AIR digest=4, internal MMCS digest=4"
field          = "Goldilocks (2^64 - 2^32 + 1, 64-bit)"
extension      = "Quadratic (BinomialExtensionField<Goldilocks, 2>)"
hash           = "Poseidon2-Goldilocks-16, audited GOLDILOCKS_POSEIDON2_RC_16_*"
air_digest_words = 4
mmcs_digest_words = 4
trace_rows     = 16
merkle_depth   = 10
blowup_factor  = 2
num_queries    = 64
fri_folding    = 4
commit_pow_bits = 16
query_pow_bits  = 16
proof_bytes    = 271_120
public_bytes   = 128
security_bits_native_field = 128
security_bits_conjectured_fri = 127
security_bits_hash_collision = 128

[bench_shape]
description = """
Identical loop to the M33 GL sibling. Same proof bytes, same iter count.
Only the firmware target (riscv32imac-unknown-none-elf) changes.
"""
iterations = 20

[bench.pq_semaphore_gl_verify]
circuit       = "pq-semaphore-d10-gl, verify_with_config"
iterations    = 20
cycles_min    = 405_048_321
cycles_max    = 405_210_667
cycles_median = 405_126_433
us_min        = 2_700_322
us_max        = 2_701_404
us_median     = 2_700_842
range_pct     = 0.040
result        = "ok"

[compare.cross_isa]
m33_run                  = "benchmarks/runs/2026-04-29-m33-pq-semaphore-gl"
m33_us                   = 1_995_661
rv32_us                  = 2_700_842
ratio                    = 1.354
note = """
Cross-ISA ratio 1.354 — wider than the BabyBear sibling at every phase:

  Phase A     1.195 (grind only)
  Phase B     1.191 (d6 + grinding)
  Phase C     1.152 (full pipeline incl. parse)
  Phase D     1.354 (Goldilocks × Quadratic)

Goldilocks pays a higher RV32 tax than BabyBear because the M33's UMAAL
instruction (32×32+32+32→64 multiply-accumulate) is exactly the
primitive needed for 64-bit Goldilocks reduction; Hazard3 has no such
fused op and must emulate. The BabyBear path still pays multi-precision
costs in the Quartic extension but the base-field arithmetic stays
inside one 32-bit register, narrowing the cross-ISA gap.
"""

[predictions_phase_d]
predicted_rv32_us_low     = 1_100_000
predicted_rv32_us_high    = 1_300_000
phase_b_baseline_us       = 1_269_727     # benchmarks/runs/2026-04-29-rv32-pq-semaphore-d6
verdict                   = "HYPOTHESIS REJECTED. Predicted 1100-1300 ms RV32; measured 2700.84 ms — +113% over Phase B BabyBear-d6 baseline. Same root cause as the M33 sibling: PQ-Semaphore verify is hash-bound, and Poseidon2-Goldilocks-16 with 64-bit element multi-precision arithmetic + 22 partial rounds is materially more expensive than Poseidon2-BabyBear-16 with 13 partial rounds + native 32-bit ops. Hazard3 is hit harder than Cortex-M33 because it lacks UMAAL."

[result_summary]
status                    = "Phase D landed, hypothesis rejected — useful negative result"
rv32_verify_ms_median     = 2700.84
rv32_vs_babybear_d6_ratio = 2.127       # 2700.84 / 1269.73
takeaway                  = "Goldilocks × Quadratic on Hazard3 is more than 2× the BabyBear × Quartic-d6 cost. The cross-ISA ratio also widens (1.19→1.35). For a portable embedded verifier across ARM and RISC-V, BabyBear stays the right choice; Goldilocks's portability story regresses, not improves."
