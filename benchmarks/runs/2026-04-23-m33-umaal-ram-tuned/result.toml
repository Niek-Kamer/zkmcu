[meta]
date = "2026-04-23"
target = "rp2350-cortex-m33"
toolchain = "rustc 1.94.1"
profile = "release, lto=fat, opt-level=s, codegen-units=1"
commit = ""

[hardware]
board = "Raspberry Pi Pico 2 W"
cpu = "ARM Cortex-M33"
clock_hz = 150_000_000
sram_bytes = 524288
flash_bytes = 4194304

[libraries]
"substrate-bn"     = "0.6.0"
"substrate-bn-src" = "local path: vendor/bn (Niek-Kamer/bn master; cortex-m33-asm + .ram_text placement)"
"ark-groth16"      = "0.5.0"

[footprint]
text_bytes = 73_632
data_bytes = 0
bss_bytes  = 98_348
heap_bytes = 98_304
stack_peak_bytes = 15_724

[bench.groth16_verify]
circuit = "x^2 = y"
public_inputs = 1
ic_size = 2
iterations = 5
cycles_median = 97_386_974
cycles_min    = 97_381_101
cycles_max    = 97_390_825
us_median     = 649_246
result = "ok"

[bench.groth16_verify_sq5]
