[meta]
date       = "2026-04-29"
target     = "rp2350-cortex-m33"
toolchain  = "rustc 1.94.1"
profile    = "release, lto=fat, opt-level=s, codegen-units=1, panic=abort"
commit     = ""

[hardware]
board      = "Raspberry Pi Pico 2 W"
cpu        = "Cortex-M33 @ 150 MHz"
clock_hz   = 150_000_000
sram_bytes = 524_288
flash_bytes = 4_194_304

[libraries]
"p3-uni-stark"          = "0.5.1 (vendor/Plonky3, path dep)"
"p3-baby-bear"          = "0.5.1 (vendor/Plonky3, path dep, audited Poseidon2 constants)"
"p3-poseidon2-air"      = "0.5.1 (vendor/Plonky3, path dep)"
"p3-fri"                = "0.5.1 (vendor/Plonky3, path dep)"
"postcard"              = "1.1.3 (no_std, alloc feature)"
"zkmcu-verifier-plonky3" = "0.1.0"
"zkmcu-vectors"         = "(committed proof at data/p3-poseidon2-chain-bb/)"
"bench-core"            = "0.1.0"
"rp235x-hal"            = "0.4.0"

[footprint]
text_bytes       = 185_860
data_bytes       = 0
bss_bytes        = 266_404
heap_bytes       = 262_144         # configured static heap (256 KB)
stack_peak_bytes = 2_456
heap_peak_bytes  = 216_292         # measured during boot verify
heap_base_bytes  = 84_228          # heap residency before verify (parsed proof + config + air)

[circuit]
name           = "p3-poseidon2-chain-bb"
description    = "Plonky3 VectorizedPoseidon2Air over BabyBear, 64 audited Poseidon2 permutations (R_F=8, R_P=13, alpha=7, t=16)"
field          = "BabyBear (15 * 2^27 + 1, 31-bit)"
extension      = "Quartic (BinomialExtensionField<BabyBear, 4>)"
hash           = "Poseidon2-BabyBear-16, audited BABYBEAR_POSEIDON2_RC_16_*"
trace_rows     = 64
vector_len     = 1
trace_cols     = "~200 (VectorizedPoseidon2Air full)"
blowup_factor  = 2                 # log_blowup = 1
num_queries    = 28
fri_folding    = 4                 # max_log_arity = 1, default folding
proof_bytes    = 90_254
public_inputs  = 0                 # AIR has no public inputs
security_bits_conjectured = 95     # standard for BabyBear+Quartic at these FRI params

# ---- Headline result. The first Plonky3 STARK verifier path on RP2350. -----

[bench.pq_poseidon_chain_verify]
circuit       = "p3-poseidon2-chain-bb, 64 Poseidon2 permutations, 28 queries"
iterations    = 26
cycles_min    = 73_809_388
cycles_max    = 73_846_925
cycles_median = 73_833_644
cycles_mean   = 73_833_436
us_min        = 492_062
us_max        = 492_312
us_median     = 492_224
range_pct     = 0.051             # (max - min) / median, percent
result        = "ok"

[bench.boot_measure]
iterations  = 1
cycles      = 73_844_932
us          = 492_299
stack_bytes = 2_456
heap_peak   = 216_292
heap_base   = 84_228
result      = "ok"

# ---- Falsification scorecard against research/reports/2026-04-29-pq-semaphore-scoping.typ.
#
# This AIR is NOT the headline PQ-Semaphore AIR (which is depth-10 Merkle
# membership + nullifier + scope binding, narrower trace, 64 queries).
# It is the de-risk anchor measurement: smallest meaningful AIR using
# the audited Poseidon2 path end-to-end. Predictions in the scoping doc
# were stated for the eventual PQ-Semaphore AIR, so this comparison is
# a *transferable indicator* not a strict falsification.

[scoping_predictions_2026_04_29]
predicted_verify_ms_low   = 900
predicted_verify_ms_point = 1200
predicted_verify_ms_high  = 1800
measured_verify_ms        = 492
verdict_verify            = "FALSIFIED LOW: measured ~2.4x faster than the lower bound. Plonky3 verifier on Cortex-M33 is substantially cheaper than the winterfell-anchored prediction implied. Rerun the prediction once the headline PQ-Semaphore AIR shape lands; this anchor suggests the column-count scaling factor (~3-5x in scoping doc table) and per-query cost are both lower than estimated."

predicted_proof_kb_low    = 15
predicted_proof_kb_point  = 30
predicted_proof_kb_high   = 30
measured_proof_kb         = 88
verdict_proof_size        = "OUTSIDE PREDICTED RANGE: this AIR has ~200 trace columns vs the predicted 24-32 for PQ-Semaphore. Wide trace expands per-query Merkle openings; PQ-Semaphore's narrow trace should land back in the 15-30 KB band as predicted."

predicted_total_ram_kb_low  = 80
predicted_total_ram_kb_high = 140
measured_heap_peak_kb       = 211
measured_stack_peak_kb      = 2.4
verdict_ram                 = "OUTSIDE PREDICTED RANGE (high): measured heap ~50% over the upper bound. Same wide-trace cause as proof size; PQ-Semaphore's narrow trace should bring this back. Still well within the 256 KB SRAM tier."

predicted_variance_low_pct  = 0.05
predicted_variance_high_pct = 0.15
measured_variance_pct       = 0.051
verdict_variance            = "INSIDE PREDICTED RANGE (low edge): 0.051% range/median across 26 iterations, second-tightest measurement in the project after Semaphore (0.030%). TLSF allocator + bench-core's measure_cycles guard rails hold up across the wider Plonky3 working set."

# ---- Comparison vs the Groth16/BN254 baseline this milestone replaces. ----

[compare.vs_groth16_bn254]
groth16_us_median       = 550_671   # benchmarks/runs/2026-04-28-m33-bn254-rebench
groth16_proof_bytes     = 256
groth16_heap_peak_bytes = 98_348    # bss + tracking heap from that run
plonky3_us_median       = 492_224   # this run
plonky3_proof_bytes     = 90_254
plonky3_heap_peak_bytes = 216_292
verify_speedup          = "1.119x faster (Plonky3 < Groth16)"
proof_size_inflation    = "352x bigger"
heap_inflation          = "2.20x bigger"
note                    = "Headline shift vs scoping doc. The scoping doc framed PQ-Semaphore as 2-3x slower than Groth16 verify ('the PQ tax'). On this AIR Plonky3 is already FASTER than the Groth16/BN254 verify on the same silicon. PQ-Semaphore proper may not match this delta (it has 64 queries vs 28 here, plus more constraint complexity), but the 'PQ is a verify-time regression' framing is no longer load-bearing. The cost is in proof size (352x) and heap (2.2x), which are deployment-relevant in different ways."
