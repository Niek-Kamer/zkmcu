name: CI

# Each job calls a single `just ci-*` recipe. Those recipes are defined
# in the root `justfile` and are the SINGLE SOURCE OF TRUTH for what
# CI runs. Lefthook's pre-push hook calls the same recipes locally, so
# a clean local push run is a strong signal CI will also pass.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  host:
    name: host (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: extractions/setup-just@v2

      - uses: Swatinem/rust-cache@v2

      - name: just ci-host
        run: just ci-host

  firmware-m33:
    name: firmware (Cortex-M33)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install stable Rust + thumbv8m.main target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv8m.main-none-eabihf
          components: clippy

      - uses: extractions/setup-just@v2

      - uses: Swatinem/rust-cache@v2

      - name: just ci-firmware-m33
        run: just ci-firmware-m33

  firmware-rv32:
    name: firmware (Hazard3 RV32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install stable Rust + riscv32imac target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv32imac-unknown-none-elf
          components: clippy

      - uses: extractions/setup-just@v2

      - uses: Swatinem/rust-cache@v2

      - name: just ci-firmware-rv32
        run: just ci-firmware-rv32

  docs:
    name: Typst PDFs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v3
        with:
          typst-version: "0.14.2"

      - uses: extractions/setup-just@v2

      - name: just ci-docs
        run: just ci-docs
